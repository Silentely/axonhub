name: Feature Request / 功能请求
description: Suggest a new feature or enhancement / 提出新功能或改进建议
title: "[Feature/功能]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature!
        感谢你提出功能建议！

        Please search existing issues before submitting to avoid duplicates.
        提交前请先搜索现有 issues，避免重复。

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist / 提交前检查
      description: Please confirm the following before submitting / 提交前请确认以下内容
      options:
        - label: I have searched the [existing issues](https://github.com/looplj/axonhub/issues) and this feature has not been requested / 我已搜索现有 issues，此功能尚未被提出
          required: true
        - label: I have read the [documentation](https://github.com/looplj/axonhub#readme) / 我已阅读文档
          required: true

  - type: checkboxes
    id: faq-check
    attributes:
      label: FAQ Check / FAQ 检查
      description: |
        If this feature is already covered in the FAQ, the issue will be closed directly.
        如果此功能已在 FAQ 中覆盖，该 issue 将被直接关闭。
      options:
        - label: I have checked the [FAQ](https://github.com/looplj/axonhub/issues/1374) and this feature has not been requested there / 我已查阅 FAQ，此功能未被提及
          required: true

  - type: textarea
    id: background
    attributes:
      label: Background / 背景说明
      description: Describe the context, scenario, and rationale behind this feature request / 描述提出此功能需求的背景、场景和原因
      placeholder: |
        What is the context or scenario? Why is this feature needed?
        什么场景？为什么需要这个功能？
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement / 问题描述
      description: A clear and concise description of what the problem is / 清晰简洁地描述问题
      placeholder: |
        Ex. I'm always frustrated when [...] / 例如：当 [...] 时我总是很困扰
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution / 期望方案
      description: Describe the solution you'd like / 描述你希望的解决方案
      placeholder: A clear and concise description of what you want to happen. / 清晰简洁地描述你希望实现的效果。
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Feature Category / 功能分类
      description: What area does this feature relate to? / 该功能属于哪个方向？
      options:
        - API Compatibility / API 兼容性
        - Channel Management / 渠道管理
        - Load Balancing / Failover / 负载均衡 / 故障切换
        - Authentication / Security / 认证 / 安全
        - Monitoring / Logging / 监控 / 日志
        - UI / Dashboard / UI / 控制台
        - Configuration / 配置
        - Documentation / 文档
        - Performance / 性能
        - Other / 其他
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context / 其他补充信息
      description: Add any other context, screenshots, or information about the feature request here / 在此补充其他上下文、截图或更多信息
